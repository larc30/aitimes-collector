name: Collect AITimes Articles

on:
  schedule:
    # 매주 월요일 23:00 UTC(일) = 한국시간 월요일 오전 8시
    - cron: "0 23 * * 0"
  workflow_dispatch:   # 수동 실행 버튼

permissions:
  contents: write

jobs:
  collect:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install requests beautifulsoup4

      - name: Collect article list
        run: python collect.py

      - name: Commit results
        run: |
          git config user.name "aitimes-collector"
          git config user.email "actions@github.com"
          git add articles.md articles.json
          git diff --cached --quiet || git commit -m "collect: $(date +'%Y-%m-%d')"
          git push

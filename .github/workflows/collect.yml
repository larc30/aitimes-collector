name: Collect AITimes Articles

on:
  schedule:
    # 매일 22:00 UTC = 한국시간 매일 오전 7시 (누적 수집)    
    - cron: "0 22,4,10 * * *"
  workflow_dispatch:   # 수동 실행 버튼

permissions:
  contents: write

jobs:
  collect:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install requests beautifulsoup4

      - name: Collect article list
        run: python collect.py

      - name: Commit results
        run: |
          git config user.name "aitimes-collector"
          git config user.email "actions@github.com"
          git add articles.md articles.json
          git diff --cached --quiet || git commit -m "collect: $(date +'%Y-%m-%d %H:%M')"
          git pull --rebase origin main
          git push

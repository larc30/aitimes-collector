name: Collect AITimes Articles

on:
  schedule:
    # UTC 22:00/04:00/10:00 = KST 07시/13시/19시 (누적 수집)
    - cron: "0 22,4,10 * * *"
  workflow_dispatch:   # 수동 실행 버튼
    inputs:
      max_pages:
        description: "수집할 목록 페이지 수 (백필 시 12 권장, 평시 비워두면 3)"
        required: false
        default: "3"
      detail_limit:
        description: "리드문 폴백용 상세 페이지 방문 상한 (백필 시 60 권장)"
        required: false
        default: "15"

permissions:
  contents: write

jobs:
  collect:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install requests beautifulsoup4

      - name: Collect article list
        env:
          MAX_PAGES: ${{ github.event.inputs.max_pages || '3' }}
          DETAIL_FETCH_LIMIT: ${{ github.event.inputs.detail_limit || '15' }}
        run: python collect.py

      - name: Commit results
        run: |
          git config user.name "aitimes-collector"
          git config user.email "actions@github.com"
          git add articles.md articles.json
          git diff --cached --quiet || git commit -m "collect: $(date +'%Y-%m-%d %H:%M')"
          git pull --rebase origin main
          git push
